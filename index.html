<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Bogotá Verde AR</title>

  <!-- Versiones fijas compatibles (A-Frame 1.5 + AR.js master fallan en varios móviles) -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.min.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: sans-serif;
    }
    #ar-hint {
      position: fixed;
      top: 12px;
      left: 12px;
      right: 12px;
      z-index: 9999;
      padding: 10px 12px;
      background: rgba(0, 0, 0, 0.75);
      color: #fff;
      font-size: 14px;
      line-height: 1.35;
      border-radius: 8px;
      pointer-events: none;
      text-align: center;
    }
    #ar-hint.found {
      background: rgba(0, 100, 0, 0.85);
    }
    #app-ui {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 10000;
      pointer-events: none;
      font-family: system-ui, sans-serif;
    }
    #menu-bar {
      pointer-events: auto;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 8px;
      background: rgba(255, 255, 255, 0.95);
      border-top: 2px solid #006400;
      max-height: 42vh;
      overflow-y: auto;
    }
    #menu-bar button {
      flex: 1 1 45%;
      min-width: 140px;
      padding: 10px 8px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: #f8f8f8;
      font-size: 13px;
      text-align: left;
      color: #222;
    }
    #menu-bar button:active {
      background: #d4edda;
      border-color: #006400;
    }
    #menu-bar button.quiz-btn {
      color: #0000aa;
      font-weight: 600;
    }
    #content-panel {
      position: relative;
      pointer-events: auto;
      display: none;
      margin: 8px;
      padding: 12px 14px 14px;
      max-height: 50vh;
      overflow-y: auto;
      background: rgba(255, 255, 255, 0.97);
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
      border: 1px solid #ddd;
    }
    #content-panel.open {
      display: block;
    }
    #content-panel h2 {
      margin: 0 28px 8px 0;
      font-size: 16px;
      color: #006400;
    }
    #content-panel p {
      margin: 0 0 8px;
      font-size: 14px;
      line-height: 1.45;
      color: #333;
      white-space: pre-line;
    }
    #btn-close {
      position: absolute;
      top: 8px;
      right: 10px;
      width: 32px;
      height: 32px;
      border: none;
      border-radius: 50%;
      background: #eee;
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
    }
    #quiz-area button {
      display: block;
      width: 100%;
      margin: 6px 0;
      padding: 10px;
      text-align: left;
      border-radius: 8px;
      border: 1px solid #ccc;
      background: #fff;
      font-size: 14px;
    }
    #quiz-feedback {
      margin-top: 8px;
      font-weight: 600;
      color: #006400;
      min-height: 1.2em;
    }
  </style>
</head>

<body>
  <div id="ar-hint">Apunta la cámara al marcador Hiro (impreso o en otra pantalla, bien iluminado).</div>

  <div id="app-ui">
    <div id="content-panel">
      <button type="button" id="btn-close" aria-label="Cerrar">×</button>
      <h2 id="content-title"></h2>
      <p id="content-body"></p>
      <div id="quiz-area" hidden>
        <p id="quiz-pregunta"></p>
        <button type="button" id="quiz-opcionA"></button>
        <button type="button" id="quiz-opcionB"></button>
        <p id="quiz-feedback"></p>
      </div>
    </div>
    <nav id="menu-bar" aria-label="Menú principal">
      <button type="button" data-section="mapa">1) Mapa de parques</button>
      <button type="button" data-section="info">2) Información del lugar</button>
      <button type="button" data-section="historia">3) Historia y cultura</button>
      <button type="button" data-section="ambiente">4) Cuidado ambiental</button>
      <button type="button" data-section="normas">5) Normas de uso</button>
      <button type="button" data-section="seguridad">6) Seguridad</button>
      <button type="button" class="quiz-btn" data-section="quiz">7) Mini quiz</button>
    </nav>
  </div>

  <!-- Escena A-Frame con AR.js activado -->
  <a-scene
    embedded
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true; precision: medium;"
    arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false; detectionMode: mono;"
  >

    <!-- Marcador Hiro (patrón oficial en CDN) -->
    <a-marker
      type="pattern"
      url="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/data/data/patt.hiro"
      emitevents="true"
      id="hiro-marker"
    >

      <!-- Parque 3D (solo decoración sobre el marcador) -->
      <a-entity scale="0.55 0.55 0.55">
        <a-plane position="0 0 0"
                 rotation="-90 0 0"
                 width="2" height="2"
                 color="#7EC850">
        </a-plane>
        <a-cylinder position="-0.5 0.35 -0.35" radius="0.05" height="0.35" color="#8B5A2B"></a-cylinder>
        <a-sphere position="-0.5 0.65 -0.35" radius="0.18" color="#228B22"></a-sphere>
        <a-cylinder position="0.5 0.35 -0.35" radius="0.05" height="0.35" color="#8B5A2B"></a-cylinder>
        <a-sphere position="0.5 0.65 -0.35" radius="0.18" color="#2E8B57"></a-sphere>
        <a-box position="0.35 0.15 0.15" depth="0.2" height="0.08" width="0.45" color="#B5651D"></a-box>
        <a-cylinder position="-0.2 0.15 0.55" radius="0.08" height="0.28" color="#2E8B57"></a-cylinder>
      </a-entity>

    </a-marker>

    <a-entity camera></a-entity>

  </a-scene>

  <script>
    const secciones = {
      mapa: {
        titulo: "Mapa de parques",
        cuerpo: "Parques destacados:\n• Parque Simón Bolívar\n• Parque Nacional\n• Parque El Tunal\n• Parque de los Novios\n\nSelecciona Información del lugar para más detalles."
      },
      info: {
        titulo: "Información del lugar",
        cuerpo: "Ejemplo — Parque Simón Bolívar:\nUbicación: Teusaquillo.\nActividades: deporte, picnic, conciertos.\nServicios: ciclovía, baños, zonas verdes.\n\nLlega temprano, usa bloqueador solar y respeta la señalización."
      },
      historia: {
        titulo: "Historia y cultura",
        cuerpo: "Los parques de Bogotá son espacios de recreación, cultura y encuentro ciudadano: festivales, conciertos y deporte.\n\nCultura ciudadana: comparte con respeto, escucha a los demás y cuida el mobiliario."
      },
      ambiente: {
        titulo: "Cuidado ambiental",
        cuerpo: "• Deposita residuos en las canecas.\n• No pises zonas reforestadas.\n• Protege árboles y fauna urbana.\n\nSeparar residuos y reducir el ruido ayuda al entorno."
      },
      normas: {
        titulo: "Normas de uso",
        cuerpo: "• Cuida el mobiliario urbano.\n• Respeta peatones y ciclorrutas.\n• No dañes césped ni flores.\n• Mascotas con correa (y bozal si aplica)."
      },
      seguridad: {
        titulo: "Seguridad",
        cuerpo: "• Cuida tus objetos personales.\n• Evita zonas solas de noche.\n• Sigue señalización oficial.\n• Define puntos de encuentro con tu grupo."
      }
    };

    const preguntas = [
      {
        texto: "¿Qué debes hacer con la basura en el parque?",
        opciones: [
          "A) Tirarla al suelo.",
          "B) Depositarla en las canecas."
        ],
        correcta: 1,
        feedbackOk: "Correcto, usar las canecas cuida el entorno.",
        feedbackError: "No es correcto, la basura siempre va en las canecas."
      },
      {
        texto: "Si llevas mascota al parque, ¿qué es lo adecuado?",
        opciones: [
          "A) Dejarla suelta sin supervisión.",
          "B) Llevarla con correa y recoger sus desechos."
        ],
        correcta: 1,
        feedbackOk: "Muy bien, así cuidas a otros usuarios y al parque.",
        feedbackError: "Recuerda usar correa y recoger los desechos de tu mascota."
      },
      {
        texto: "En la noche, lo más seguro es:",
        opciones: [
          "A) Ir solo a zonas solas.",
          "B) Preferir zonas iluminadas y con más gente."
        ],
        correcta: 1,
        feedbackOk: "Exacto, las zonas iluminadas son más seguras.",
        feedbackError: "Es mejor evitar zonas solas en horarios nocturnos."
      }
    ];

    let indicePregunta = 0;

    document.addEventListener("DOMContentLoaded", () => {
      const hint = document.getElementById("ar-hint");
      const marker = document.querySelector("#hiro-marker");
      if (marker) {
        marker.addEventListener("markerFound", () => {
          hint.textContent = "Marcador detectado. Mantén el Hiro estable en la vista.";
          hint.classList.add("found");
        });
        marker.addEventListener("markerLost", () => {
          hint.textContent = "Marcador perdido. Vuelve a centrar el Hiro en la cámara.";
          hint.classList.remove("found");
        });
      }

      const contentPanel = document.getElementById("content-panel");
      const contentTitle = document.getElementById("content-title");
      const contentBody = document.getElementById("content-body");
      const quizArea = document.getElementById("quiz-area");
      const preguntaEl = document.getElementById("quiz-pregunta");
      const opcionAEl = document.getElementById("quiz-opcionA");
      const opcionBEl = document.getElementById("quiz-opcionB");
      const feedbackEl = document.getElementById("quiz-feedback");
      const btnClose = document.getElementById("btn-close");

      function cerrarPanel() {
        contentPanel.classList.remove("open");
      }

      function mostrarSeccion(id) {
        const data = secciones[id];
        contentTitle.textContent = data.titulo;
        contentBody.textContent = data.cuerpo;
        contentBody.hidden = false;
        quizArea.hidden = true;
        contentPanel.classList.add("open");
      }

      function cargarPregunta(i) {
        const p = preguntas[i];
        preguntaEl.textContent = p.texto;
        opcionAEl.textContent = p.opciones[0];
        opcionBEl.textContent = p.opciones[1];
        feedbackEl.textContent = "";
      }

      function mostrarQuiz() {
        contentTitle.textContent = "Mini quiz";
        contentBody.hidden = true;
        quizArea.hidden = false;
        indicePregunta = 0;
        cargarPregunta(0);
        contentPanel.classList.add("open");
      }

      function responder(indiceOpcion) {
        const p = preguntas[indicePregunta];
        feedbackEl.textContent =
          indiceOpcion === p.correcta ? p.feedbackOk : p.feedbackError;
        setTimeout(() => {
          indicePregunta = (indicePregunta + 1) % preguntas.length;
          cargarPregunta(indicePregunta);
        }, 3000);
      }

      document.querySelectorAll("#menu-bar button").forEach((btn) => {
        btn.addEventListener("click", () => {
          const section = btn.getAttribute("data-section");
          if (section === "quiz") {
            mostrarQuiz();
          } else {
            mostrarSeccion(section);
          }
        });
      });

      btnClose.addEventListener("click", cerrarPanel);
      opcionAEl.addEventListener("click", () => responder(0));
      opcionBEl.addEventListener("click", () => responder(1));
    });
  </script>
</body>
</html>
